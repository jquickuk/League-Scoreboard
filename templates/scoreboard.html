<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Live Scoreboard</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* =========================
   FULLSCREEN PROMPT
========================= */
#fsPrompt {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    z-index: 300;
    align-items: center;
    justify-content: center;
    text-align: center;
}

#fsPrompt button {
    background: #00b3ff;
    border: none;
    color: black;
    font-size: 1.4rem;
    padding: 16px 24px;
    border-radius: 14px;
    cursor: pointer;
}

/* =========================
   FULLSCREEN BUTTON
========================= */
#fullscreenBtn {
    position: fixed;
    top: 10px;
    right: 12px;
    z-index: 200;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 1.2rem;
    cursor: pointer;
    opacity: 0.6;
}

#fullscreenBtn:hover {
    opacity: 1;
}

/* =========================
   NOT LIVE SCREEN
========================= */
#notLive {
    position: absolute;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
}

/* =========================
   SCOREBOARD
========================= */
#board {
    display: flex;
    height: 100vh;
}

.team {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.home { background: #0057ff; }
.away { background: #d10000; }

.name { font-size: 4vh; }
.score { font-size: 20vh; font-weight: bold; }

/* =========================
   LAST UPDATED
========================= */
#updated {
    position: fixed;
    bottom: 10px;
    right: 14px;
    font-size: 0.85rem;
    opacity: 0.75;
}
</style>
</head>

<body>

<!-- Fullscreen first-tap prompt -->
<div id="fsPrompt">
    <button onclick="enterFullscreen()">
        ⛶ Tap to enter fullscreen
    </button>
</div>

<button id="fullscreenBtn" onclick="toggleFullscreen()">⛶</button>

<div id="notLive">
    <div style="font-size:6vh;">🕒 Match Not Live</div>
    <div style="font-size:3.5vh; margin-top:10px;">
        The scoreboard will appear automatically when the match starts
    </div>
</div>

<div id="board">
    <div class="team home">
        <div class="name" id="homeName">HOME</div>
        <div class="score" id="homeScore">0</div>
    </div>
    <div class="team away">
        <div class="name" id="awayName">AWAY</div>
        <div class="score" id="awayScore">0</div>
    </div>
</div>

<div id="updated"></div>

<script>
/* =========================
   FULLSCREEN LOGIC
========================= */

const fsPrompt = document.getElementById("fsPrompt");

function isFullscreen() {
    return document.fullscreenElement ||
           document.webkitFullscreenElement;
}

function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    fsPrompt.style.display = "none";
    localStorage.setItem("fullscreenUsed", "1");
}

function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}

function toggleFullscreen() {
    isFullscreen() ? exitFullscreen() : enterFullscreen();
}

/* Show prompt only once, and not in PWA */
const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

if (!isStandalone && !localStorage.getItem("fullscreenUsed")) {
    fsPrompt.style.display = "flex";
}

/* =========================
   SOCKET + SCORE LOGIC
========================= */

const SOCKET_KEY = "frames-secret";
const slug = location.pathname.split("/").pop();

const socket = io({ query: { key: SOCKET_KEY } });

socket.on("connect", () => {
    socket.emit("join_team", { slug });
});

socket.on("match_status", data => {
    document.getElementById("notLive").style.display =
        data.status === "live" ? "none" : "flex";
});

socket.on("score_update", data => {
    document.getElementById("homeName").textContent = data.home.name;
    document.getElementById("awayName").textContent = data.away.name;
    document.getElementById("homeScore").textContent = data.home.score;
    document.getElementById("awayScore").textContent = data.away.score;

    if (data.updated) {
        document.getElementById("updated").textContent =
            "Last updated: " + new Date(data.updated).toLocaleTimeString();
    }
});
</script>

</body>
</html>
